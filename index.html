<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>File Drop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0c0e13;
      --surface: #13161d;
      --border: #2a2f3a;
      --border-active: #4ade80;
      --text: #e4e7ec;
      --text-dim: #6b7280;
      --accent: #4ade80;
      --accent-dim: rgba(74, 222, 128, 0.08);
      --accent-glow: rgba(74, 222, 128, 0.15);
      --danger: #f87171;
      --radius: 10px;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 3rem 1.5rem;
      background-image: radial-gradient(ellipse 600px 300px at 50% 0%, rgba(74, 222, 128, 0.04), transparent);
    }

    header { text-align: center; margin-bottom: 2.5rem; animation: fadeDown 0.5s ease-out; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }

    header h1 { font-family: 'JetBrains Mono', monospace; font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 0.35rem; }
    header h1 span { color: var(--accent); }
    header p { color: var(--text-dim); font-size: 0.92rem; font-weight: 300; }

    .drop-zone {
      width: 100%; max-width: 560px;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 3.5rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
      animation: fadeUp 0.5s ease-out 0.1s both;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--border-active);
      background: var(--accent-dim);
      box-shadow: 0 0 40px var(--accent-glow);
    }

    .drop-zone input[type="file"] { display: none; }

    .drop-icon { width: 48px; height: 48px; margin: 0 auto 1rem; stroke: var(--accent); opacity: 0.7; transition: opacity 0.2s; }
    .drop-zone:hover .drop-icon { opacity: 1; }
    .drop-zone h2 { font-weight: 500; font-size: 1.05rem; margin-bottom: 0.3rem; }
    .drop-zone h2 strong { color: var(--accent); font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
    .drop-zone p { color: var(--text-dim); font-size: 0.82rem; }

    .file-list { width: 100%; max-width: 560px; margin-top: 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .file-item {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1rem;
      animation: slideIn 0.3s ease-out;
      position: relative; overflow: hidden;
    }

    @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

    .file-item .progress-bar {
      position: absolute; left: 0; bottom: 0;
      height: 2px; background: var(--accent);
      transition: width 0.15s ease; width: 0%;
    }

    .file-item.done { border-color: rgba(74, 222, 128, 0.3); }
    .file-item.error { border-color: rgba(248, 113, 113, 0.3); }

    .file-icon { flex-shrink: 0; width: 34px; height: 34px; background: var(--accent-dim); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .file-icon svg { width: 18px; height: 18px; stroke: var(--accent); }
    .file-meta { flex: 1; min-width: 0; }
    .file-meta .name { font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta .size { font-size: 0.72rem; color: var(--text-dim); margin-top: 1px; }

    .file-status { flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); }
    .file-status.ok { color: var(--accent); }
    .file-status.err { color: var(--danger); }

    .file-remove { flex-shrink: 0; background: none; border: none; cursor: pointer; color: var(--text-dim); padding: 4px; border-radius: 4px; transition: color 0.15s, background 0.15s; }
    .file-remove:hover { color: var(--danger); background: rgba(248, 113, 113, 0.1); }
    .file-remove svg { width: 16px; height: 16px; }

    .upload-btn {
      margin-top: 1rem; width: 100%; max-width: 560px; padding: 0.85rem;
      border: none; border-radius: var(--radius);
      background: var(--accent); color: var(--bg);
      font-family: 'JetBrains Mono', monospace; font-size: 0.88rem; font-weight: 700; letter-spacing: 0.04em;
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
      display: none;
    }

    .upload-btn.visible { display: block; animation: fadeUp 0.3s ease-out; }
    .upload-btn:hover { opacity: 0.88; }
    .upload-btn:active { transform: scale(0.99); }
    .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      position: fixed; bottom: 2rem; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 0.75rem 1.25rem;
      font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--accent);
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    footer { margin-top: auto; padding-top: 3rem; color: var(--text-dim); font-size: 0.72rem; font-family: 'JetBrains Mono', monospace; opacity: 0.5; }
  </style>
</head>
<body>

  <header>
    <h1><span>&gt;</span> file_drop</h1>
    <p>Drag files here or click to browse</p>
  </header>

  <div class="drop-zone" id="dropZone">
    <input type="file" id="fileInput" multiple />
    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
      <polyline points="17 8 12 3 7 8" />
      <line x1="12" y1="3" x2="12" y2="15" />
    </svg>
    <h2>Drop files or <strong>browse</strong></h2>
    <p>Any file type accepted</p>
  </div>

  <div class="file-list" id="fileList"></div>
  <button class="upload-btn" id="uploadBtn">UPLOAD FILES</button>
  <div class="toast" id="toast"></div>
  <footer>s3 direct upload</footer>

  <script>
    // =====================================================
    //  CONFIG — your S3 bucket
    // =====================================================
    const BUCKET = 'file-drop-uploads-082223548160';
    const REGION = 'us-east-1';
    const S3_URL = `https://${BUCKET}.s3.${REGION}.amazonaws.com/uploads`;
    // =====================================================

    const dropZone  = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileList  = document.getElementById('fileList');
    const uploadBtn = document.getElementById('uploadBtn');
    const toast     = document.getElementById('toast');
    let selectedFiles = [];
    let uploading = false;

    ['dragenter','dragover'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('drag-over'); }));
    ['dragleave','drop'].forEach(e => dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('drag-over'); }));
    dropZone.addEventListener('drop', e => addFiles(e.dataTransfer.files));
    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { addFiles(fileInput.files); fileInput.value = ''; });

    function addFiles(list) {
      if (uploading) return;
      for (const f of list) {
        if (!selectedFiles.find(s => s.name === f.name && s.size === f.size)) selectedFiles.push(f);
      }
      renderList();
    }

    function removeFile(idx) {
      if (uploading) return;
      selectedFiles.splice(idx, 1);
      renderList();
    }

    function renderList() {
      fileList.innerHTML = '';
      selectedFiles.forEach((f, i) => {
        const item = document.createElement('div');
        item.className = 'file-item';
        item.id = `file-${i}`;
        item.innerHTML = `
          <div class="progress-bar" id="prog-${i}"></div>
          <div class="file-icon"><svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
          <div class="file-meta"><div class="name">${escHtml(f.name)}</div><div class="size">${formatSize(f.size)}</div></div>
          <span class="file-status" id="status-${i}"></span>
          <button class="file-remove" onclick="removeFile(${i})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
        fileList.appendChild(item);
      });
      uploadBtn.classList.toggle('visible', selectedFiles.length > 0);
    }

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFiles.length || uploading) return;
      uploading = true;
      uploadBtn.textContent = 'UPLOADING…';
      uploadBtn.disabled = true;

      let ok = 0, fail = 0;

      for (let i = 0; i < selectedFiles.length; i++) {
        const f = selectedFiles[i];
        const statusEl = document.getElementById(`status-${i}`);
        const progEl   = document.getElementById(`prog-${i}`);
        const itemEl   = document.getElementById(`file-${i}`);

        // Unique key: timestamp + random + original filename
        const key = `${Date.now()}_${Math.random().toString(36).slice(2, 8)}_${f.name}`;
        const url = `${S3_URL}/${encodeURIComponent(key)}`;

        statusEl.textContent = 'uploading…';

        try {
          await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('PUT', url);
            xhr.setRequestHeader('Content-Type', f.type || 'application/octet-stream');

            xhr.upload.onprogress = (e) => {
              if (e.lengthComputable) progEl.style.width = `${(e.loaded / e.total) * 100}%`;
            };

            xhr.onload = () => (xhr.status >= 200 && xhr.status < 300) ? resolve() : reject(new Error(`${xhr.status}`));
            xhr.onerror = () => reject(new Error('network error'));
            xhr.send(f);
          });

          statusEl.textContent = '✓';
          statusEl.className = 'file-status ok';
          itemEl.classList.add('done');
          ok++;
        } catch (err) {
          console.error(`Upload failed: ${f.name}`, err);
          statusEl.textContent = '✗ ' + err.message;
          statusEl.className = 'file-status err';
          itemEl.classList.add('error');
          fail++;
        }
      }

      showToast(fail ? `${ok} uploaded, ${fail} failed` : `${ok} file(s) uploaded`);
      selectedFiles = [];
      setTimeout(() => { renderList(); uploading = false; uploadBtn.textContent = 'UPLOAD FILES'; uploadBtn.disabled = false; }, 2000);
    });

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / 1048576).toFixed(1) + ' MB';
    }

    function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>
</body>
</html>
